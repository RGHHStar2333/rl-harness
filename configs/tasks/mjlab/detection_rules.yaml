rules:
  - id: mjlab_g1_mild_plateau_l1
    description: MJLab G1 reward is improving too slowly, apply a small automatic learning-rate reduction.
    metric: train/episode_reward_mean
    condition:
      type: trend
      window: 5
      min_delta: 1.0
    response_level: L1
    cooldown_steps: 50000000
    auto_adjustments:
      - target: agent.learning_rate
        operation: multiply
        value: 0.95
        reason: Small automatic learning-rate reduction for MJLab G1.
      - target: reward_weights.track_linear_velocity
        operation: multiply
        value: 1.05
        reason: Slightly strengthen linear velocity tracking while reward is plateaued.

  - id: mjlab_g1_reward_plateau_l2
    description: MJLab G1 reward has not improved enough for a longer period.
    metric: train/episode_reward_mean
    condition:
      type: trend
      window: 10
      min_delta: 2.0
    response_level: L2
    suggestions:
      - target: agent.learning_rate
        operation: multiply
        value: 0.8
        reason: Lower learning rate if MJLab G1 reward is stuck.
      - target: reward_weights.track_linear_velocity
        operation: multiply
        value: 1.2
        reason: Increase forward velocity tracking reward when learning is stuck.
      - target: reward_weights.action_rate_l2
        operation: multiply
        value: 0.85
        reason: Reduce action-rate penalty magnitude to let the policy explore smoother gait corrections.

  - id: mjlab_g1_reward_crash_l3
    description: MJLab G1 reward dropped to a dangerous value.
    metric: train/episode_reward_mean
    condition:
      type: threshold
      operator: "<"
      value: 5
    response_level: L3
    emergency_action: pause_training
