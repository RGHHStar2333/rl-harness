project:
  name: rl_harness_mujoco
  task: half_cheetah
  run_id: halfcheetah_mvp_001

environment:
  env_id: HalfCheetah-v5
  algorithm: PPO
  total_timesteps: 100000
  device: cpu

paths:
  hyper_config: configs/tasks/halfcheetah/hyper.yaml
  reward_config: configs/tasks/halfcheetah/reward.yaml
  detection_rules: configs/detection_rules.yaml
  reward_skills: configs/reward_skills.yaml
  run_dir: runs/halfcheetah_mvp_001
  checkpoint_dir: checkpoints/halfcheetah_mvp_001
  report_dir: reports

checkpoint:
  save_interval: 20000
  keep_recent: 5
  keep_best: 3

feedback_flywheel:
  enabled: true
  l1_max_change_ratio: 0.10
  l2_confirm_timeout_minutes: 60
  notification_mode: console

mechanical_enforcement:
  schema_check: true
  dependency_direction_check: true
  checkpoint_interval_check: true
  metric_naming_check: true
