rules:
  - id: halfcheetah_reward_plateau
    description: HalfCheetah reward has not improved enough.
    metric: train/episode_reward_mean
    condition:
      type: trend
      window: 5
      min_delta: 50.0
    response_level: L2
    suggestions:
      - target: ppo.learning_rate
        operation: multiply
        value: 0.8
        reason: Lower learning rate if reward is unstable or stuck.

  - id: halfcheetah_reward_crash
    description: HalfCheetah reward dropped to a very bad value.
    metric: train/episode_reward_mean
    condition:
      type: threshold
      operator: "<"
      value: -1000
    response_level: L3
    emergency_action: pause_training
